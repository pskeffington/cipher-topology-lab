name: Python CI and Smoke Workflow

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with TDA extras
        run: python -m pip install -e ".[dev,tda]"

      - name: Run unit tests
        run: pytest -q

      - name: Run lint checks
        run: ruff check src scripts tests

      - name: Remove stale generated artifacts
        run: make clean-generated

      - name: Generate smoke streams
        run: python scripts/00_generate_streams.py --config configs/cubical_smoke_test.json

      - name: Build smoke embeddings
        run: python scripts/01_embed_ciphertext.py --config configs/cubical_smoke_test.json

      - name: Compute smoke TDA features with ripser and GUDHI
        run: python scripts/02_compute_tda_features.py --config configs/cubical_smoke_test.json

      - name: Validate ripser backend
        run: python scripts/07_validate_tda_backend.py --features data/processed/tda_features.csv --require-backend ripser --require-finite-h1

      - name: Run internal randomness diagnostics
        run: python scripts/03_randomness_tests.py --config configs/cubical_smoke_test.json

      - name: Analyze smoke outputs
        run: python scripts/04_analyze_results.py --config configs/cubical_smoke_test.json

      - name: Export external randomness-test inputs
        run: python scripts/05_export_randomness_inputs.py --manifest data/raw/stream_manifest.csv

      - name: Parse external randomness-test outputs
        run: python scripts/06_parse_external_results.py

      - name: Validate artifact coherence
        run: python scripts/08_validate_artifact_coherence.py --config configs/cubical_smoke_test.json

      - name: Upload generated diagnostic artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: |
            data/raw/stream_manifest.csv
            data/interim/embedding_manifest.csv
            data/processed/*.csv
            results/tables/*.csv
            results/figures/*
            results/logs/*
            external_tests/inputs/export_manifest.csv
            results/tables/external_randomness_tests.csv
